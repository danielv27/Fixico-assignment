services:
  api:
    build: ./api
    volumes:
      - ./api:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: ./web
    environment:
      API_URL: http://api:8000
    ports:
      - "3001:3000"
    depends_on:
      api: { condition: service_healthy }

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fixico_assignment
      POSTGRES_USER: fixico
      POSTGRES_PASSWORD: fixico
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixico -d fixico_assignment"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
